name: Build Nexus Arab Store APKs

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ─── APK 1: المتجر (للمستخدمين) ───────────────────
  build-store:
    name: Store APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Pillow
        run: pip install Pillow --quiet
      - name: Install dependencies
        run: npm install
      - name: Build Store (Vite)
        run: npm run build
        env:
          VITE_APP_MODE: store
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_WHATSAPP_NUMBER: ${{ secrets.VITE_WHATSAPP_NUMBER }}
          VITE_ADMIN_DEFAULT_PASSWORD: ${{ secrets.VITE_ADMIN_DEFAULT_PASSWORD }}
      - name: Init Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          npx cap init "Nexus Arab Store" "dev.mohamedghanem.nexusarab.store" --web-dir dist
      - name: Add Android
        run: npx cap add android
      - name: Sync
        run: npx cap sync android
      - name: Setup icon
        run: python3 resize_icon.py
      - name: Generate assets
        run: npx capacitor-assets generate --android
      - name: Sync again
        run: npx cap sync android
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: Nexus-Store-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # ─── APK 2: لوحة التحكم (للأدمن) ──────────────────
  build-admin:
    name: Admin APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Install Pillow
        run: pip install Pillow --quiet
      - name: Install dependencies
        run: npm install
      - name: Build Admin (Vite)
        run: npm run build
        env:
          VITE_APP_MODE: admin
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_WHATSAPP_NUMBER: ${{ secrets.VITE_WHATSAPP_NUMBER }}
          VITE_ADMIN_DEFAULT_PASSWORD: ${{ secrets.VITE_ADMIN_DEFAULT_PASSWORD }}
      - name: Init Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          npx cap init "Nexus Admin" "dev.mohamedghanem.nexusarab.admin" --web-dir dist
      - name: Add Android
        run: npx cap add android
      - name: Sync
        run: npx cap sync android
      - name: Setup icon
        run: python3 resize_icon.py
      - name: Generate assets
        run: npx capacitor-assets generate --android
      - name: Sync again
        run: npx cap sync android
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: Nexus-Admin-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
